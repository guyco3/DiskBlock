name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  rust-check-and-test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test

  build-release-artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: rust-check-and-test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: memblocks-linux
            binary_path: target/release/memblocks
          - os: macos-latest
            artifact_name: memblocks-macos
            binary_path: target/release/memblocks

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/memblocks"
          chmod +x dist/memblocks
          tar -C dist -czf "${{ matrix.artifact_name }}.tar.gz" memblocks

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/memblocks-linux/memblocks-linux.tar.gz
            dist/memblocks-macos/memblocks-macos.tar.gz
          generate_release_notes: true
